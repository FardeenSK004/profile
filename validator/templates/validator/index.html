<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Picture Validator</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-color: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.7);
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --primary: #3b82f6;
        --primary-hover: #2563eb;
        --success: #10b981;
        --error: #ef4444;
        --warning: #f59e0b;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        width: 100%;
        max-width: 500px;
        padding: 2rem;
        box-sizing: border-box;
      }

      .card {
        background: var(--card-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 2.5rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        text-align: center;
      }

      h1 {
        margin: 0 0 0.5rem 0;
        font-size: 1.75rem;
        font-weight: 700;
        background: linear-gradient(to right, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      p.subtitle {
        color: var(--text-muted);
        margin-bottom: 2rem;
        font-size: 0.95rem;
        line-height: 1.5;
      }

      .upload-area {
        border: 2px dashed rgba(255, 255, 255, 0.2);
        border-radius: 16px;
        padding: 2.5rem 1.5rem;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        background: rgba(0, 0, 0, 0.1);
      }

      .upload-area:hover,
      .upload-area.dragover {
        border-color: var(--primary);
        background: rgba(59, 130, 246, 0.05);
      }

      .upload-area input[type="file"] {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        cursor: pointer;
      }

      .upload-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
        color: var(--primary);
        opacity: 0.8;
      }

      .upload-text {
        font-weight: 500;
        margin-bottom: 0.5rem;
      }

      .upload-hint {
        font-size: 0.8rem;
        color: var(--text-muted);
      }

      .preview-container {
        display: none;
        margin-top: 2rem;
      }

      .preview-image {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        margin: 0 auto 1.5rem auto;
        display: block;
      }

      .btn {
        background: var(--primary);
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 9999px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.2s ease;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }

      .btn:hover {
        background: var(--primary-hover);
        transform: translateY(-2px);
      }

      .btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
      }

      .loader {
        display: none;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 1s ease-in-out infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .result-container {
        display: none;
        margin-top: 1.5rem;
        padding: 1.25rem;
        border-radius: 12px;
        animation: slideUp 0.4s ease forwards;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .result-success {
        background: rgba(16, 185, 129, 0.1);
        border: 1px solid rgba(16, 185, 129, 0.2);
        color: #34d399;
      }

      .result-error {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        color: #f87171;
      }

      .result-warning {
        background: rgba(245, 158, 11, 0.1);
        border: 1px solid rgba(245, 158, 11, 0.2);
        color: #fbbf24;
      }

      .score-circle {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 1.25rem;
        margin: 0 auto 1rem auto;
        background: rgba(0, 0, 0, 0.2);
        border: 3px solid currentColor;
      }

      .messages-list {
        list-style: none;
        padding: 0;
        margin: 0;
        text-align: left;
        font-size: 0.9rem;
      }

      .messages-list li {
        margin-bottom: 0.5rem;
        padding-left: 1.5rem;
        position: relative;
      }

      .messages-list li::before {
        content: "•";
        position: absolute;
        left: 0.5rem;
        color: currentColor;
      }

      #reset-btn {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.2);
        margin-top: 1rem;
        color: var(--text-muted);
      }

      #reset-btn:hover {
        background: rgba(255, 255, 255, 0.05);
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>Profile Picture Validator</h1>
        <p class="subtitle">
          Mansi Jii batayenge aap aa sakte ho ya naii.
        </p>

        <div id="upload-phase">
          <div class="upload-area" id="drop-zone">
            <input
              type="file"
              id="file-input"
              accept="image/jpeg, image/png, image/webp"
            />
            <div class="upload-icon">📸</div>
            <div class="upload-text">Click or drag image here</div>
            <div class="upload-hint">JPG, PNG, WEBP up to 5MB</div>
          </div>
        </div>

        <div id="preview-phase" class="preview-container">
          <img id="image-preview" class="preview-image" src="" alt="Preview" />

          <button id="analyze-btn" class="btn">
            <span>Analyze Image</span>
            <div class="loader" id="btn-loader"></div>
          </button>

          <div id="result-box" class="result-container">
            <div id="score-display" class="score-circle">100</div>
            <ul id="messages" class="messages-list"></ul>
          </div>

          <button id="reset-btn" class="btn" style="display: none">
            Upload Another
          </button>
        </div>
      </div>
    </div>

    <script>
      const dropZone = document.getElementById("drop-zone");
      const fileInput = document.getElementById("file-input");
      const uploadPhase = document.getElementById("upload-phase");
      const previewPhase = document.getElementById("preview-phase");
      const imagePreview = document.getElementById("image-preview");
      const analyzeBtn = document.getElementById("analyze-btn");
      const btnText = analyzeBtn.querySelector("span");
      const btnLoader = document.getElementById("btn-loader");
      const resultBox = document.getElementById("result-box");
      const scoreDisplay = document.getElementById("score-display");
      const messagesList = document.getElementById("messages");
      const resetBtn = document.getElementById("reset-btn");

      let currentFile = null;

      // Drag and drop handlers
      ["dragenter", "dragover", "dragleave", "drop"].forEach((eventName) => {
        dropZone.addEventListener(eventName, preventDefaults, false);
      });

      function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
      }

      ["dragenter", "dragover"].forEach((eventName) => {
        dropZone.addEventListener(
          eventName,
          () => dropZone.classList.add("dragover"),
          false,
        );
      });

      ["dragleave", "drop"].forEach((eventName) => {
        dropZone.addEventListener(
          eventName,
          () => dropZone.classList.remove("dragover"),
          false,
        );
      });

      dropZone.addEventListener(
        "drop",
        (e) => {
          const dt = e.dataTransfer;
          const files = dt.files;
          handleFiles(files);
        },
        false,
      );

      fileInput.addEventListener("change", function () {
        handleFiles(this.files);
      });

      function handleFiles(files) {
        if (files.length > 0) {
          currentFile = files[0];

          // Check file type
          if (!currentFile.type.startsWith("image/")) {
            alert("Please upload an image file.");
            return;
          }

          // Preview
          const reader = new FileReader();
          reader.onload = (e) => {
            imagePreview.src = e.target.result;
            uploadPhase.style.display = "none";
            previewPhase.style.display = "block";
          };
          reader.readAsDataURL(currentFile);
        }
      }

      analyzeBtn.addEventListener("click", async () => {
        if (!currentFile) return;

        // UI Loading State
        analyzeBtn.disabled = true;
        btnText.textContent = "Analyzing...";
        btnLoader.style.display = "block";
        resultBox.style.display = "none";
        messagesList.innerHTML = "";

        const formData = new FormData();
        formData.append("image", currentFile);

        try {
          const response = await fetch("/analyze/", {
            method: "POST",
            body: formData,
          });

          const data = await response.json();

          if (response.ok) {
            showResult(data);
          } else {
            throw new Error(data.error || "Something went wrong");
          }
        } catch (error) {
          showResult({ valid: false, score: 0, messages: [error.message] });
        } finally {
          analyzeBtn.style.display = "none";
          resetBtn.style.display = "flex";
        }
      });

      function showResult(data) {
        resultBox.style.display = "block";

        resultBox.className = "result-container"; // Reset

        if (data.valid && data.score === 100) {
          resultBox.classList.add("result-success");
        } else if (data.valid) {
          resultBox.classList.add("result-warning");
        } else {
          resultBox.classList.add("result-error");
        }

        scoreDisplay.textContent = data.score;

        data.messages.forEach((msg) => {
          const li = document.createElement("li");
          li.textContent = msg;
          messagesList.appendChild(li);
        });
      }

      resetBtn.addEventListener("click", () => {
        currentFile = null;
        fileInput.value = "";
        uploadPhase.style.display = "block";
        previewPhase.style.display = "none";
        resultBox.style.display = "none";
        analyzeBtn.style.display = "flex";
        analyzeBtn.disabled = false;
        btnText.textContent = "Analyze Image";
        btnLoader.style.display = "none";
        resetBtn.style.display = "none";
      });
    </script>
  </body>
</html>
